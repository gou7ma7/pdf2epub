# 示例规则：复制为 rules.yaml 并按你的 PDF 调参

regions:
  # 用于候选筛选（避免误删正文）
  top_ratio: 0.25
  bottom_ratio: 0.25
  # 中间区域默认不删；仅对“高置信”命中才删（如 URL/公众号）
  allow_midpage_high_confidence: true

repeating_text:
  # 页眉/页脚这种强重复（书名/章名/水印）
  header_footer_min_page_ratio: 0.70
  header_footer_min_pages: 5

  # 广告段落可能“每隔几页重复一次”，阈值应更宽松
  ad_repeat_min_page_ratio: 0.03
  ad_repeat_min_pages: 5

ad_detection:
  # 广告段落通常很短（1-3 句）
  max_len_chars: 120

  # 高置信：允许在中间区域也删（仅这些规则）
  high_confidence_patterns:
    - "https?://"
    - "www\\."
    - "公众号"
    - "扫码"
    - "微信"

  # 普通置信（只在 top/bottom 区域生效）
  patterns:
    - "关注"
    - "加群"
    - "QQ群"
    - "vx"
    - "V信"
    - "订阅"
    - "推广"
    - "广告"
    - "下载"

chapter_detection:
  # 保守分章：优先靠文本模式，其次才用字号（字号不可靠）
  chinese_chapter_regex:
    - "^第[一二三四五六七八九十百千0-9]+章"
    - "^第[一二三四五六七八九十百千0-9]+节"
  # 如果你希望“只按章不按节”，可以删掉第二条

  # 仅当字号显著大于正文时，才认为是标题
  # 例如：span_size >= (body_median_size * size_multiplier)
  size_multiplier: 1.6

approval:
  # true: 先生成候选删除清单，交互确认后再真正删
  interactive: true
  # 自动批准高置信重复页眉页脚（仍会记录到报告），减少交互负担
  auto_approve_header_footer: false
